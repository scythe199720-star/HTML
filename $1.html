<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Valentine Memory</title>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            background-color: #ffdde1; font-family: 'Pixelify Sans', cursive; 
            overflow: hidden; 
        }

        #heartCanvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }

        /* Container diperkecil agar pas di layar HP */
        #letter-container { 
            background-color: #ff8a80; padding: 6px; border: 3px solid #b71c1c; 
            box-shadow: 8px 8px 0px #880e4f; animation: heartbeat 1.5s infinite; 
            z-index: 10; width: 85%; max-width: 320px; 
        }

        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        .letter-window { 
            background-color: #fff1f1; border: 2px solid #b71c1c; 
            padding: 20px 15px; text-align: center; position: relative; 
        }

        .window-header { 
            position: absolute; top: 0; left: 0; right: 0; height: 18px; 
            background-color: #ff8a80; border-bottom: 2px solid #b71c1c; 
            display: flex; justify-content: space-between; padding: 2px 8px; 
            color: white; font-size: 10px; align-items: center; 
        }

        #letter-title { font-size: 1.2rem; color: #b71c1c; margin: 15px 0 10px 0; }
        
        .cat { width: 110px; image-rendering: pixelated; margin: 10px 0; }

        .btn { 
            padding: 8px 15px; font-family: inherit; font-size: 0.9rem; 
            font-weight: bold; cursor: pointer; border: 2px solid #b71c1c; 
            background-color: #fff; color: #b71c1c; box-shadow: 3px 3px 0px #b71c1c; 
            margin-top: 10px; 
        }

        /* Galeri Grid 3 Kolom agar ringkas di layar HP */
        #gallery-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffdde1; z-index: 100;
            display: none; flex-direction: column; align-items: center; 
            padding: 20px; box-sizing: border-box; overflow-y: auto;
        }

        .gallery-title { font-family: 'Dancing Script', cursive; font-size: 1.8rem; color: #b71c1c; margin: 10px 0; }
        
        .photo-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            width: 100%; 
            max-width: 350px;
            margin-bottom: 20px;
        }

        .photo-grid img { 
            width: 100%; aspect-ratio: 1/1; object-fit: cover;
            border: 2px solid white; border-radius: 4px; 
            cursor: pointer; transition: 0.2s;
        }

        /* Mode Layar Penuh (Fullscreen Preview) */
        #fullscreen-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 200;
            display: none; justify-content: center; align-items: center;
        }

        #fullscreen-view img { max-width: 90%; max-height: 80%; border: 3px solid white; border-radius: 8px; }
        
        #close-fullscreen { 
            position: absolute; top: 20px; right: 20px; 
            color: white; font-size: 2.5rem; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>

    <!-- Jendela Utama -->
    <div id="letter-container">
        <div class="letter-window">
            <div class="window-header"><span>LOVE_MEMORIES.EXE</span><span>❤</span></div>
            <h1 id="letter-title">Will you be my Valentine?</h1>
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZ3bmZueGZ3bmZueGZ3Jm1zPTE/KztT2c4u8mYYUiCiS0/giphy.gif" class="cat" id="letter-cat">
            
            <div id="letter-buttons">
                <button class="btn" id="yesBtn">YES!</button>
                <button class="btn" style="position:relative;" id="noBtn">No</button>
            </div>

            <div id="next-step" style="display: none">
                <p style="color: #b71c1c; font-size: 0.9rem; font-weight: bold;">I knew you'd say yes! ❤️</p>
                <button class="btn" id="viewGallery">Buka Galeri Kenangan ✨</button>
            </div>
        </div>
    </div>

    <!-- Overlay Galeri -->
    <div id="gallery-overlay">
        <h2 class="gallery-title">Our Precious Moments</h2>
        <div class="photo-grid">
            <!-- GANTI SRC DI BAWAH INI DENGAN FOTO KAMU -->
            <img src="foto1.jpg" onclick="openFull(this.src)">
            <img src="foto2.jpg" onclick="openFull(this.src)">
            <img src="foto3.jpg" onclick="openFull(this.src)">
            <img src="foto4.jpg" onclick="openFull(this.src)">
            <img src="foto5.jpg" onclick="openFull(this.src)">
            <img src="foto6.jpg" onclick="openFull(this.src)">
        </div>
        <button class="btn" onclick="document.getElementById('gallery-overlay').style.display='none'">Kembali</button>
    </div>

    <!-- Viewer Layar Penuh -->
    <div id="fullscreen-view" onclick="this.style.display='none'">
        <span id="close-fullscreen">&times;</span>
        <img id="fullImg" src="">
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const nextStep = document.getElementById('next-step');
        const galleryOverlay = document.getElementById('gallery-overlay');
        const fullView = document.getElementById('fullscreen-view');
        const fullImg = document.getElementById('fullImg');
        const catImg = document.getElementById('letter-cat');
        const title = document.getElementById('letter-title');

        // Klik YES
        yesBtn.addEventListener('click', () => {
            title.innerText = "❤️ I LOVE YOU! ❤️";
            catImg.src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNndrN3R5czJ6bmZueGZ3Jm1zPTE/v2a971AkXYY1S/giphy.gif";
            document.getElementById('letter-buttons').style.display = 'none';
            nextStep.style.display = 'block';
        });

        // Buka Galeri
        document.getElementById('viewGallery').addEventListener('click', () => {
            galleryOverlay.style.display = 'flex';
        });

        // Fungsi Layar Penuh
        function openFull(src) {
            fullImg.src = src;
            fullView.style.display = 'flex';
        }

        // Tombol No Menghindar
        noBtn.addEventListener('mouseover', () => {
            noBtn.style.position = 'fixed';
            noBtn.style.left = Math.random() * (window.innerWidth - 60) + 'px';
            noBtn.style.top = Math.random() * (window.innerHeight - 40) + 'px';
        });

        // Animasi Hati (Canvas)
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let hearts = [];
        function createHeart() { return { x: Math.random() * canvas.width, y: -20, size: Math.random() * 8 + 4, speed: Math.random() * 2 + 1, opacity: Math.random() * 0.5 + 0.3 }; }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff4d4d';
            hearts.forEach((h, i) => {
                ctx.globalAlpha = h.opacity; ctx.beginPath(); ctx.arc(h.x, h.y, h.size, 0, Math.PI*2); ctx.fill();
                h.y += h.speed; if(h.y > canvas.height) hearts[i] = createHeart();
            });
            requestAnimationFrame(draw);
        }
        for(let i=0; i<30; i++) hearts.push(createHeart());
        draw();
    </script>
</body>
</html>
